<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 — 작전노트</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#6366f1">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="작전노트">
  <link rel="stylesheet" href="style.css">
<style>
  body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; padding-bottom:24px; }
  .auth-wrap { width:100%; max-width:380px; }
  .auth-logo { text-align:center; margin-bottom:36px; }
  .auth-logo .logo-text { font-size:26px; font-weight:800; letter-spacing:-.5px; }
  .auth-logo .logo-text span { color:var(--primary); }
  .auth-logo p { font-size:13px; color:var(--text-3); margin-top:6px; }
  .tab-row { display:flex; background:var(--surface-2); border-radius:var(--r); padding:4px; margin-bottom:24px; }
  .tab-btn { flex:1; padding:9px; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; background:transparent; color:var(--text-3); font-family:inherit; transition:all .15s; }
  .tab-btn.active { background:var(--surface-3); color:var(--text); }
  .error-msg { background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.3); color:#fca5a5; border-radius:var(--r); padding:10px 14px; font-size:13px; margin-bottom:12px; display:none; }
  .role-select { display:flex; gap:10px; margin-bottom:4px; }
  .role-card { flex:1; border:2px solid var(--surface-3); border-radius:var(--r); padding:14px 10px; text-align:center; cursor:pointer; transition:all .15s; background:var(--surface-2); }
  .role-card.selected { border-color:var(--primary); background:rgba(99,102,241,.08); }
  .role-card .role-icon { font-size:24px; margin-bottom:6px; }
  .role-card .role-name { font-size:13px; font-weight:700; color:var(--text); }
  .role-card .role-desc { font-size:11px; color:var(--text-3); margin-top:2px; line-height:1.4; }
</style>
</head>
<body>

<div class="auth-wrap">
  <div class="auth-logo">
    <div class="logo-text">작전<span>노트</span></div>
    <p>나만의 공부 작전을 시작해봐</p>
  </div>

  <div class="tab-row">
    <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">로그인</button>
    <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">회원가입</button>
  </div>

  <div class="error-msg" id="error-msg"></div>

  <div id="login-form">
    <div class="form-group">
      <label class="form-label">이메일</label>
      <input class="form-input" type="email" id="login-email" placeholder="example@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">비밀번호</label>
      <input class="form-input" type="password" id="login-pw" placeholder="비밀번호 입력" autocomplete="current-password">
    </div>
    <button class="btn btn-primary btn-lg mt-8" id="login-btn" onclick="login()">로그인</button>
    <p style="text-align:center;margin-top:12px;font-size:13px;color:var(--text-3)">
      <a href="#" onclick="resetPassword()" style="color:var(--primary);text-decoration:none;font-weight:600">비밀번호를 잊으셨나요?</a>
    </p>
  </div>

  <div id="signup-form" style="display:none">
    <div class="form-group">
      <label class="form-label">나는 누구야?</label>
      <div class="role-select">
        <div class="role-card selected" id="role-mentee" onclick="selectRole('mentee')">
          <div class="role-icon">📚</div>
          <div class="role-name">멘티</div>
          <div class="role-desc">공부하는 학습자</div>
        </div>
        <div class="role-card" id="role-mentor" onclick="selectRole('mentor')">
          <div class="role-icon">👀</div>
          <div class="role-name">멘토</div>
          <div class="role-desc">부모·선생님·코치</div>
        </div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">이메일</label>
      <input class="form-input" type="email" id="signup-email" placeholder="example@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">비밀번호 <span class="text-3">(6자 이상)</span></label>
      <input class="form-input" type="password" id="signup-pw" placeholder="비밀번호 설정" autocomplete="new-password">
    </div>
    <div class="form-group">
      <label class="form-label">비밀번호 확인</label>
      <input class="form-input" type="password" id="signup-pw2" placeholder="비밀번호 재입력" autocomplete="new-password">
    </div>
    <button class="btn btn-success btn-lg mt-8" id="signup-btn" onclick="signup()">가입하기</button>
  </div>

  <p class="text-xs text-3" style="text-align:center;margin-top:20px">
    로그인 정보는 이 기기에 저장돼 다음엔 자동으로 로그인돼
  </p>
  <p style="text-align:center;margin-top:16px">
    <a href="landing.html" style="font-size:12px;color:#64748b;text-decoration:none">
      앱 소개 다시 보기 →
    </a>
  </p>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
// auth.html 전용 Firebase 초기화 (firebase-config.js 미사용 — 독립적으로 동작)
const _firebaseConfig = {
  apiKey: "AIzaSyB8F6DcDxaJ0lt5znwL0BNlPkZXr8OZCSk",
  authDomain: "selfstudy-planner.firebaseapp.com",
  projectId: "selfstudy-planner",
  storageBucket: "selfstudy-planner.firebasestorage.app",
  messagingSenderId: "283483008828",
  appId: "1:283483008828:web:21f20545f2499294ac3839"
};

// 중복 초기화 방지
const _app = firebase.apps.length
  ? firebase.app()
  : firebase.initializeApp(_firebaseConfig);
const _auth = firebase.auth(_app);
const _db   = firebase.firestore(_app);

let _selectedRole = 'mentee';

function selectRole(role) {
  _selectedRole = role;
  document.getElementById('role-mentee').classList.toggle('selected', role === 'mentee');
  document.getElementById('role-mentor').classList.toggle('selected', role === 'mentor');
}

// 첫 방문이면 랜딩 페이지로
try {
  const fromLanding = new URLSearchParams(location.search).get('tab');
  if (!localStorage.getItem('onboarded') && !fromLanding) {
    location.replace('landing.html');
  }
  // 회원가입 탭으로 바로 이동 요청 시
  if (fromLanding === 'signup') {
    document.addEventListener('DOMContentLoaded', () => switchTab('signup'));
  }
} catch {}

// 이미 로그인돼 있으면 역할에 따라 이동
_auth.onAuthStateChanged(async user => {
  if (!user) return;
  try {
    const doc = await _db.collection('users').doc(user.uid).get();
    const role = doc.exists ? doc.data().role : 'mentee';
    location.href = role === 'mentor' ? 'mentor.html' : 'index.html';
  } catch {
    location.href = 'index.html';
  }
});

// ── UI 함수 ──────────────────────────────────
function switchTab(tab) {
  const isLogin = tab === 'login';
  document.getElementById('tab-login').classList.toggle('active', isLogin);
  document.getElementById('tab-signup').classList.toggle('active', !isLogin);
  document.getElementById('login-form').style.display  = isLogin ? 'block' : 'none';
  document.getElementById('signup-form').style.display = isLogin ? 'none'  : 'block';
  hideError();
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg; el.style.display = 'block';
}
function hideError() {
  document.getElementById('error-msg').style.display = 'none';
}

const ERR = {
  'auth/user-not-found':      '등록된 이메일이 없어요.',
  'auth/wrong-password':      '비밀번호가 틀렸어요.',
  'auth/invalid-email':       '이메일 형식이 올바르지 않아요.',
  'auth/email-already-in-use': '이미 사용 중인 이메일이에요.',
  'auth/weak-password':        '비밀번호는 6자리 이상이어야 해요.',
  'auth/too-many-requests':    '잠시 후 다시 시도해 주세요.',
  'auth/invalid-credential':   '이메일 또는 비밀번호가 올바르지 않아요.',
};

async function resetPassword() {
  const email = document.getElementById('login-email').value.trim();
  if (!email) { showError('이메일을 먼저 입력해 주세요.'); return; }
  try {
    await _auth.sendPasswordResetEmail(email);
    showError('');
    alert(`${email} 로 비밀번호 재설정 링크를 보냈어요. 메일함을 확인해 주세요.`);
  } catch(e) {
    showError(e.code === 'auth/user-not-found' ? '등록된 이메일이 없어요.' : '전송 실패. 다시 시도해 주세요.');
  }
}

async function login() {
  const email = document.getElementById('login-email').value.trim();
  const pw    = document.getElementById('login-pw').value;
  if (!email || !pw) { showError('이메일과 비밀번호를 입력해 주세요.'); return; }
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = '로그인 중...';
  hideError();
  try {
    await _auth.signInWithEmailAndPassword(email, pw);
    // onAuthStateChanged가 리디렉션 처리
  } catch(e) {
    showError(ERR[e.code] || '로그인에 실패했어요. 다시 시도해 주세요.');
    btn.disabled = false; btn.textContent = '로그인';
  }
}

async function signup() {
  const email = document.getElementById('signup-email').value.trim();
  const pw    = document.getElementById('signup-pw').value;
  const name  = document.getElementById('signup-name')?.value.trim() || '';
  if (!email || !pw) { showError('이메일과 비밀번호를 입력해 주세요.'); return; }
  const btn = document.getElementById('signup-btn');
  btn.disabled = true; btn.textContent = '가입 중...';
  hideError();
  try {
    const cred = await _auth.createUserWithEmailAndPassword(email, pw);
    await _db.collection('users').doc(cred.user.uid).set({
      email,
      name: name || email.split('@')[0],
      role: _selectedRole,
      createdAt: new Date().toISOString(),
    });
    localStorage.setItem('onboarded', '1');
    location.href = _selectedRole === 'mentor' ? 'mentor.html' : 'index.html';
  } catch(e) {
    showError(ERR[e.code] || '가입에 실패했어요. 다시 시도해 주세요.');
    btn.disabled = false; btn.textContent = '가입하기';
  }
}
</script>
</body>
</html>
