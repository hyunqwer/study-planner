<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 공부 작전노트</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Top Nav -->
<header class="nav-bar" style="justify-content:space-between">
  <span class="nav-logo">작전<span>노트</span></span>
  <button class="nav-back" onclick="logout()" title="로그아웃"
    style="width:auto;padding:6px 10px;font-size:12px;font-weight:600;color:var(--text-3)">
    로그아웃
  </button>
</header>

<main class="container">

  <!-- 날짜 -->
  <div class="mb-12">
    <p style="font-size:12px;color:var(--text-3);margin-bottom:4px" id="greeting-date"></p>
    <h1 id="greeting-msg">오늘 작전은?</h1>
  </div>

  <!-- 책 없음 -->
  <div id="no-book-section" style="display:none">
    <div class="card" style="padding:40px 20px;text-align:center">
      <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:block;margin:0 auto 16px"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      <h3 style="margin-bottom:6px">진행 중인 책이 없어요</h3>
      <p class="text-sm text-2" style="margin-bottom:24px">새 책을 등록하고 작전을 시작해 보세요</p>
      <a href="register.html" class="btn btn-primary btn-lg">새 책 등록하기</a>
    </div>
  </div>

  <!-- 책 있음 -->
  <div id="active-book-section" style="display:none">

    <!-- 오늘 미션 히어로 카드 -->
    <div class="hero-card" id="mission-box" onclick="location.href='mission.html?bookId='+currentBookId">
      <div class="hero-label" id="mission-tag">오늘의 미션</div>
      <div class="hero-title" id="mission-title">로딩 중...</div>
      <div class="hero-sub" id="mission-meta"></div>
      <div style="margin-top:20px">
        <span style="display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);padding:8px 16px;border-radius:99px;font-size:13px;font-weight:600;color:#fff">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          시작하기
        </span>
      </div>
    </div>

    <!-- 전체 진행률 -->
    <div class="card">
      <div class="card-label">전체 진행률</div>
      <div class="text-sm font-semibold mb-8" id="book-title-display"></div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <div class="progress-meta mt-4">
        <span id="progress-pages" class="text-2">0 / 0쪽</span>
        <span id="progress-pct" class="font-bold text-primary">0%</span>
      </div>
      <div class="flex gap-8 mt-12">
        <span class="badge badge-muted" id="target-date-badge"></span>
        <span class="badge badge-muted" id="days-left-badge"></span>
      </div>
    </div>

    <!-- 이번 주 -->
    <div class="card">
      <div class="card-label">이번 주 달성률</div>
      <div class="stat-grid mb-12">
        <div class="stat-cell">
          <div class="stat-num" id="week-pct">—</div>
          <div class="stat-lbl">달성률</div>
        </div>
        <div class="stat-cell">
          <div class="stat-num" id="week-done">0</div>
          <div class="stat-lbl">완료 쪽수</div>
        </div>
      </div>
      <div class="flex gap-8">
        <a href="weekly.html" class="btn btn-ghost btn-sm flex-1">주간 작전표</a>
        <a href="review.html" class="btn btn-ghost btn-sm flex-1">주간 점검</a>
      </div>
    </div>

    <!-- 바로가기 -->
    <div class="grid-2 mb-12">
      <a href="parent.html" class="btn btn-outline btn-md">부모 화면</a>
      <a href="bookshelf.html" class="btn btn-outline btn-md">책장</a>
    </div>

    <a href="register.html" class="btn btn-ghost btn-md w-full">+ 새 책 추가</a>
  </div>

</main>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <a href="index.html" data-page="home" class="active">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    홈
  </a>
  <a href="mission.html" data-page="mission">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    미션
  </a>
  <a href="weekly.html" data-page="weekly">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    작전표
  </a>
  <a href="review.html" data-page="review">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    점검
  </a>
  <a href="bookshelf.html" data-page="books">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
    책장
  </a>
</nav>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="app.js"></script>
<script>
let currentBookId = null;

const now = new Date();
document.getElementById('greeting-date').textContent =
  `${now.getMonth()+1}월 ${now.getDate()}일 · ${DAY_KO[now.getDay()]}요일`;

const hr = now.getHours();
document.getElementById('greeting-msg').textContent =
  hr < 12 ? '오늘 작전은?' : hr < 18 ? '집중할 시간이야' : '오늘 마무리 하자';

async function loadHome() {
  showLoading(true);
  try {
    const book = await getActiveBook();
    if (!book) {
      document.getElementById('no-book-section').style.display = 'block';
      return;
    }
    currentBookId = book.id;
    document.getElementById('active-book-section').style.display = 'block';

    document.getElementById('book-title-display').textContent =
      `[${book.subject}] ${book.title}`;

    const completed = await getTotalCompleted(book.id);
    const pct = Math.min(100, Math.round(completed / book.totalPages * 100));
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('progress-pages').textContent = `${completed} / ${book.totalPages}쪽`;
    document.getElementById('progress-pct').textContent = pct + '%';

    const daysLeft = diffDays(today(), book.targetEndDate);
    document.getElementById('target-date-badge').textContent = `목표 ${formatDate(book.targetEndDate)}`;
    document.getElementById('days-left-badge').textContent =
      daysLeft > 0 ? `${daysLeft}일 남음` : '오늘 마감';

    const todayLog = await getDailyLog(book.id, today());
    const weekDates = getThisWeekDates();
    const plan = await getWeeklyPlan(book.id, weekDates[0]);
    const dayIdx = new Date().getDay();
    const adjustedIdx = dayIdx === 0 ? 6 : dayIdx - 1;
    const todayPlan = plan ? (plan.dailyPages[adjustedIdx] || 0) : 0;

    if (todayLog && todayLog.status === 'done') {
      document.getElementById('mission-box').style.background =
        'linear-gradient(135deg, #064e3b 0%, #065f46 100%)';
      document.getElementById('mission-tag').textContent = '완료';
      document.getElementById('mission-title').textContent = '오늘 미션 완료';
      document.getElementById('mission-meta').textContent = `${todayLog.completedPages}쪽 · 수고했어`;
    } else if (todayPlan > 0) {
      document.getElementById('mission-title').textContent =
        `${book.title} ${todayPlan}쪽`;
      document.getElementById('mission-meta').textContent =
        `[${book.subject}] · 예상 ${Math.ceil(todayPlan * 5)}분`;
    } else {
      document.getElementById('mission-title').textContent = '오늘은 휴식일';
      document.getElementById('mission-meta').textContent = '내일 다시 시작';
    }

    let weekDone = 0, weekGoal = 0;
    if (plan) weekGoal = plan.dailyPages.reduce((a, b) => a + b, 0);
    for (const d of weekDates) {
      const log = await getDailyLog(book.id, d);
      if (log) weekDone += (log.completedPages || 0);
    }
    document.getElementById('week-done').textContent = weekDone;
    document.getElementById('week-pct').textContent =
      weekGoal > 0 ? Math.round(weekDone / weekGoal * 100) + '%' : '—';

  } catch(e) { console.error(e); }
  finally { showLoading(false); }
}

loadHome();
setActiveNav('home');
</script>
</body>
</html>
