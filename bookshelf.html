<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>책장 — 작전노트</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="nav-bar">
  <button class="nav-back" onclick="history.back()">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <span class="nav-title">책장</span>
</header>

<main class="container">

  <div class="flex items-center justify-between mb-16">
    <div></div>
    <a href="register.html" class="btn btn-primary btn-sm">+ 새 책</a>
  </div>

  <!-- 필터 탭 -->
  <div class="chip-group mb-16">
    <button class="chip selected" onclick="filter(this,'all')">전체</button>
    <button class="chip" onclick="filter(this,'active')">진행 중</button>
    <button class="chip" onclick="filter(this,'completed')">완주</button>
    <button class="chip" onclick="filter(this,'paused')">보류</button>
  </div>

  <div id="loading-msg" style="text-align:center;padding:40px 0;color:var(--text-3)">
    <p class="text-sm">불러오는 중</p>
  </div>

  <div id="book-list"></div>

  <div id="empty-msg" style="display:none;text-align:center;padding:48px 0">
    <div style="width:48px;height:48px;border-radius:var(--r);background:var(--surface-3);display:flex;align-items:center;justify-content:center;margin:0 auto 14px">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
    </div>
    <p class="text-sm text-2">책이 없어요</p>
  </div>

</main>

<nav class="bottom-nav">
  <a href="index.html" data-page="home"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>홈</a>
  <a href="mission.html" data-page="mission"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>미션</a>
  <a href="weekly.html" data-page="weekly"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>작전표</a>
  <a href="review.html" data-page="review"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>점검</a>
  <a href="bookshelf.html" data-page="books" class="active"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>책장</a>
</nav>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="app.js"></script>
<script>
const STATUS_BADGE = {
  active: '<span class="badge badge-primary">진행 중</span>',
  completed: '<span class="badge badge-success">완주</span>',
  paused: '<span class="badge badge-muted">보류</span>',
};

let allBooks = [], currentFilter = 'all';

async function init() {
  allBooks = await getBooks();
  document.getElementById('loading-msg').style.display = 'none';
  render();
}

function filter(el, f) {
  document.querySelectorAll('.chip-group .chip').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  currentFilter = f;
  render();
}

function render() {
  const filtered = currentFilter === 'all' ? allBooks : allBooks.filter(b => b.status === currentFilter);
  const list = document.getElementById('book-list');
  const empty = document.getElementById('empty-msg');

  if (!filtered.length) { list.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  list.innerHTML = filtered.map(book => {
    const sub = book.status === 'active'
      ? `목표일까지 ${Math.max(0, diffDays(today(), book.targetEndDate))}일 · 하루 ${book.dailyPages}쪽`
      : `${formatDate(book.startDate)} — ${formatDate(book.targetEndDate)}`;

    return `
      <div class="list-item" onclick="location.href='mission.html?bookId=${book.id}'">
        <div class="list-item-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        </div>
        <div class="list-item-body">
          <div class="list-item-title">${book.title}</div>
          <div class="list-item-sub">[${book.subject}] ${sub}</div>
          <div class="mt-8">${STATUS_BADGE[book.status] || ''}</div>
        </div>
        <div class="list-item-arrow">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </div>
    `;
  }).join('');
}

requireAuth(() => init());
setActiveNav('books');
</script>
</body>
</html>
