<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 미션 — 작전노트</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#6366f1">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="작전노트">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="nav-bar">
  <button class="nav-back" onclick="history.back()">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <span class="nav-title">오늘의 미션</span>
</header>

<main class="container">

  <div id="loading-msg" style="text-align:center;padding:80px 0;color:var(--text-3)">
    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:12px;display:block;margin-left:auto;margin-right:auto"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
    <p class="text-sm">불러오는 중</p>
  </div>

  <div id="main-content" style="display:none">

    <div style="display:flex;align-items:center;justify-content:center;gap:4px;margin-bottom:16px">
      <button onclick="shiftDate(-1)"
        style="background:none;border:none;cursor:pointer;padding:4px 10px;color:var(--text-2);font-size:20px;line-height:1">‹</button>
      <span class="text-sm text-3" id="today-label"></span>
      <button id="date-nav-next" onclick="shiftDate(1)"
        style="background:none;border:none;cursor:pointer;padding:4px 10px;color:var(--text-2);font-size:20px;line-height:1">›</button>
    </div>

    <!-- 오늘 할 일 (교재 + 과제 통합) -->
    <div id="mission-list-section" style="display:none">
      <div class="card">
        <div class="flex items-center justify-between mb-12">
          <div class="card-label" style="margin-bottom:0">오늘의 과제</div>
          <span class="text-xs text-3" id="today-done-badge"></span>
        </div>
        <div id="mission-list"></div>
        <div id="task-items" style="margin-top:4px"></div>
      </div>
    </div>

    <!-- 미션 히어로 -->
    <div class="hero-card mb-16" id="mission-header" style="cursor:default">
      <div class="hero-label" id="mission-tag">오늘의 미션</div>
      <div class="hero-title" id="mission-main-title"></div>
      <div class="hero-sub" id="mission-sub"></div>
    </div>

    <!-- 완료 상태 -->
    <div id="done-section" style="display:none">
      <div class="card text-center" style="padding:36px 24px">
        <div style="width:56px;height:56px;border-radius:50%;background:var(--success-dim);display:flex;align-items:center;justify-content:center;margin:0 auto 14px">
          <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <h3 class="mb-8">미션 완료</h3>
        <p class="text-sm text-2 mb-24" id="done-summary"></p>
        <div style="display:flex;gap:8px">
          <a href="index.html" class="btn btn-ghost btn-lg flex-1">홈으로</a>
          <button class="btn btn-primary btn-lg flex-1" onclick="editTodayLog()">기록 수정</button>
        </div>
      </div>
    </div>

    <!-- 휴식일 -->
    <div id="rest-section" style="display:none">
      <div class="card text-center" style="padding:32px 24px">
        <div style="font-size:32px;margin-bottom:12px">😴</div>
        <h3 class="mb-8" id="rest-title">오늘은 휴식일</h3>
        <p class="text-sm text-2 mb-16" id="rest-sub">잘 쉬고 내일 다시 시작해</p>
        <button class="btn btn-ghost btn-sm" onclick="recordOnRestDay()"
          style="border:1.5px solid var(--primary);color:var(--primary)">
          📝 추가 기록하기
        </button>
      </div>
    </div>

    <!-- 기록 입력 -->
    <div id="action-section" style="display:none">

      <!-- 오늘 페이지 입력 -->
      <div class="card">
        <div class="card-label" id="action-title">오늘 어디까지 했어?</div>

        <!-- 시작/끝 페이지 -->
        <div class="form-row mb-12">
          <div class="form-group" style="margin-bottom:0">
            <label class="form-label">시작 페이지</label>
            <input class="form-input" type="number" id="start-page" min="1"
              placeholder="예: 12" inputmode="numeric">
          </div>
          <div class="form-group" style="margin-bottom:0">
            <label class="form-label">끝 페이지</label>
            <input class="form-input" type="number" id="end-page" min="1"
              placeholder="예: 18" inputmode="numeric">
          </div>
        </div>

        <!-- 완료 쪽수 자동 표시 -->
        <div id="pages-calc" style="display:none;padding:10px 12px;background:var(--surface-2);border-radius:var(--r);font-size:13px;color:var(--text-2)">
          <span id="pages-calc-label">오늘</span> <strong id="pages-calc-num" style="color:var(--primary)">0</strong>쪽 완료
        </div>
      </div>

      <!-- 난이도 -->
      <div class="card">
        <div class="card-label">난이도는?</div>
        <div class="chip-group" id="difficulty-chips">
          <button class="chip" data-value="easy" onclick="selectChip('difficulty-chips',this,'easy')">쉬웠다</button>
          <button class="chip" data-value="medium" onclick="selectChip('difficulty-chips',this,'medium')">적당했다</button>
          <button class="chip" data-value="hard" onclick="selectChip('difficulty-chips',this,'hard')">어려웠다</button>
          <button class="chip" data-value="vhard" onclick="selectChip('difficulty-chips',this,'vhard')">너무 어려웠다</button>
        </div>
      </div>

      <!-- 못한 경우 이유 -->
      <div class="card" id="skip-card" style="display:none">
        <div class="card-label" id="skip-title">오늘 못 한 이유</div>
        <div class="chip-group" id="reason-chips">
          <button class="chip" data-value="no-time" onclick="selectChip('reason-chips',this,'no-time')">시간이 없었다</button>
          <button class="chip" data-value="hard" onclick="selectChip('reason-chips',this,'hard')">문제가 어려웠다</button>
          <button class="chip" data-value="lazy" onclick="selectChip('reason-chips',this,'lazy')">귀찮았다</button>
          <button class="chip" data-value="forgot" onclick="selectChip('reason-chips',this,'forgot')">까먹었다</button>
          <button class="chip" data-value="schedule" onclick="selectChip('reason-chips',this,'schedule')">다른 일이 있었다</button>
        </div>
      </div>

      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="btn btn-ghost btn-md flex-1" onclick="submitSkip()" id="skip-btn">오늘은 못 했어</button>
        <button class="btn btn-primary btn-md" style="flex:2" onclick="submitMission()" id="submit-btn">기록 저장</button>
      </div>
    </div>

  </div>

</main>

<nav class="bottom-nav">
  <a href="index.html" data-page="home">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>홈

  </a>
    <a href="reading.html" data-page="reading">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
    독서
  </a>

  </a>

    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>점검

  <a href="bookshelf.html" data-page="books">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="app.js"></script>
<script>
let currentBook = null, todayPlannedPages = 0, currentLog = null;
let selectedDifficulty = '', selectedReason = '';
const selectedDateStr = getParam('date') || today();
const dateWord = selectedDateStr === today() ? '오늘' : '이날';

function getWeekDatesFor(dateStr) {
  const d = new Date(dateStr);
  const day = d.getDay();
  const mon = new Date(d);
  mon.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
  return Array.from({ length: 7 }, (_, i) => {
    const dd = new Date(mon);
    dd.setDate(mon.getDate() + i);
    return dd.toISOString().slice(0, 10);
  });
}

function weekIndexForDate(dateStr) {
  const day = new Date(dateStr).getDay();
  return day === 0 ? 6 : day - 1;
}

function formatMissionDate(dateStr) {
  const d = new Date(dateStr);
  return `${d.getMonth()+1}월 ${d.getDate()}일 · ${DAY_KO[d.getDay()]}요일`;
}

document.getElementById('today-label').textContent = formatMissionDate(selectedDateStr);

// 오늘이면 다음 버튼 비활성화
(function() {
  const nextBtn = document.getElementById('date-nav-next');
  if (selectedDateStr >= today()) {
    nextBtn.disabled = true;
    nextBtn.style.opacity = '0.25';
    nextBtn.style.cursor = 'default';
  }
})();

function shiftDate(delta) {
  const d = new Date(selectedDateStr + 'T12:00:00');
  d.setDate(d.getDate() + delta);
  const newDate = d.toISOString().slice(0, 10);
  if (newDate > today()) return;
  const bookId = getParam('bookId');
  const params = new URLSearchParams({ date: newDate });
  if (bookId) params.set('bookId', bookId);
  location.href = `mission.html?${params.toString()}`;
}
document.getElementById('action-title').textContent = `${dateWord} 어디까지 했어?`;
document.getElementById('pages-calc-label').textContent = dateWord;
document.getElementById('skip-title').textContent = `${dateWord} 못 한 이유`;
document.getElementById('skip-btn').textContent = `${dateWord}은 못 했어`;

// 시작/끝 페이지 입력 시 완료 쪽수 자동 계산
['start-page','end-page'].forEach(id => {
  document.getElementById(id).addEventListener('input', updateCalc);
});

function updateCalc() {
  const s = parseInt(document.getElementById('start-page').value) || 0;
  const e = parseInt(document.getElementById('end-page').value) || 0;
  const calc = document.getElementById('pages-calc');
  if (s > 0 && e >= s) {
    const count = e - s + 1;
    document.getElementById('pages-calc-num').textContent = count;
    calc.style.display = 'block';
  } else {
    calc.style.display = 'none';
  }
}

function selectChip(groupId, el, val) {
  document.querySelectorAll(`#${groupId} .chip`).forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  if (groupId === 'difficulty-chips') selectedDifficulty = val;
  if (groupId === 'reason-chips') selectedReason = val;
}

function selectChipValue(groupId, val) {
  document.querySelectorAll(`#${groupId} .chip`).forEach(c => c.classList.remove('selected'));
  if (groupId === 'difficulty-chips') selectedDifficulty = val || '';
  if (groupId === 'reason-chips') selectedReason = val || '';
  if (!val) return;
  const target = document.querySelector(`#${groupId} .chip[data-value="${val}"]`);
  if (target) target.classList.add('selected');
}

function showEditForm(log) {
  currentLog = log || {};
  document.getElementById('done-section').style.display = 'none';
  document.getElementById('rest-section').style.display = 'none';
  document.getElementById('action-section').style.display = 'block';
  document.getElementById('action-title').textContent = '기록을 수정해 줘';
  document.getElementById('submit-btn').textContent = '수정 저장';
  document.getElementById('skip-card').style.display = currentLog.status === 'skip' ? 'block' : 'none';

  if (currentLog.startPage && currentLog.endPage) {
    document.getElementById('start-page').value = currentLog.startPage;
    document.getElementById('end-page').value = currentLog.endPage;
  } else if (currentLog.completedPages > 0) {
    document.getElementById('start-page').value = 1;
    document.getElementById('end-page').value = currentLog.completedPages;
  }
  selectChipValue('difficulty-chips', currentLog.difficulty || '');
  selectChipValue('reason-chips', currentLog.reason || '');
  updateCalc();
}

function editTodayLog() {
  showEditForm(currentLog);
}

function showCompletedState(log) {
  currentLog = log;
  document.getElementById('mission-header').style.background = 'linear-gradient(135deg,#064e3b,#065f46)';
  document.getElementById('mission-tag').textContent = '완료';
  document.getElementById('mission-main-title').textContent = '기록 완료';
  const pageInfo = log.startPage && log.endPage
    ? `${log.startPage}~${log.endPage}쪽 (${log.completedPages}쪽)`
    : `${log.completedPages}쪽`;
  document.getElementById('mission-sub').textContent = pageInfo;
  document.getElementById('action-section').style.display = 'none';
  document.getElementById('rest-section').style.display = 'none';
  document.getElementById('done-section').style.display = 'block';
  document.getElementById('done-summary').textContent = `${pageInfo} 완료 · 수고했어`;
}

async function submitMission() {
  const startPage = parseInt(document.getElementById('start-page').value) || 0;
  const endPage   = parseInt(document.getElementById('end-page').value)   || 0;
  if (!startPage || !endPage || endPage < startPage) {
    showToast('시작·끝 페이지를 올바르게 입력해 줘'); return;
  }
  const completedPages = endPage - startPage + 1;
  const btn = document.getElementById('submit-btn');
  const wasEditing = !!currentLog;
  const nextLog = {
    date: selectedDateStr,
    status: todayPlannedPages === 0 ? 'extra' : completedPages >= todayPlannedPages ? 'done' : 'partial',
    plannedPages: todayPlannedPages,
    completedPages,
    startPage,
    endPage,
    difficulty: selectedDifficulty,
    reason: selectedReason,
  };
  btn.disabled = true; btn.textContent = '저장 중...';
  try {
    await saveDailyLog(currentBook.id, nextLog);
    showToast(wasEditing ? '기록 수정 완료' : '기록 완료');
    if (wasEditing) {
      btn.disabled = false;
      btn.textContent = '수정 저장';
      showCompletedState(nextLog);
    } else {
      location.href = 'index.html';
    }
  } catch(e) {
    console.error(e); showToast('저장 실패');
    btn.disabled = false; btn.textContent = wasEditing ? '수정 저장' : '기록 저장';
  }
}

async function submitSkip() {
  document.getElementById('skip-card').style.display = 'block';
  // 이유 선택 후 저장
  if (!selectedReason) { showToast('못 한 이유를 선택해 줘'); return; }
  const nextLog = {
    date: selectedDateStr, status: 'skip',
    plannedPages: todayPlannedPages, completedPages: 0,
    reason: selectedReason,
  };
  try {
    await saveDailyLog(currentBook.id, nextLog);
    showToast('기록 완료');
    location.href = 'index.html';
  } catch(e) { console.error(e); showToast('저장 실패'); }
}

async function renderMissionList(books) {
  const weekDates = getThisWeekDates();
  const todayIdx  = weekIndexForToday();
  const todayStr  = today();
  const dow       = todayDow(); // KST 기준 요일

  // 교재 상태 수집
  const bookStates = await Promise.all(books.map(async book => {
    const [plan, logs] = await Promise.all([
      getOrCreateWeeklyPlan(book, weekDates),
      getDailyLogsForDates(book.id, [todayStr]),
    ]);
    return { book, plan, log: logs[todayStr] };
  }));

  // 교재 행 렌더
  const bookRows = bookStates.map(({ book, plan, log }) => {
    const planned = plan.dailyPages[todayIdx] || 0;
    const isDone  = log && (log.status === 'done' || log.status === 'partial');
    const badge   = planned === 0
      ? (log?.status === 'extra' ? '<span class="badge badge-success">추가기록</span>' : '<span class="badge badge-muted">휴식</span>')
      : log?.status === 'done'    ? '<span class="badge badge-success">완료</span>'
      : log?.status === 'partial' ? '<span class="badge badge-accent">일부</span>'
      : log?.status === 'skip'    ? '<span class="badge badge-muted">미완</span>'
      :                             '<span class="badge badge-primary">기록하기</span>';
    return `
      <div class="list-item" style="border-bottom:1px solid var(--surface-3)"
        onclick="location.href='mission.html?bookId=${book.id}'">
        <div class="list-item-icon" style="font-size:15px">${book.subject?.slice(0,1)||'📖'}</div>
        <div class="list-item-body">
          <div class="list-item-title">[${book.subject}] ${book.title}</div>
          <div class="list-item-sub">${planned>0?`오늘 ${planned}쪽 · 예상 ${Math.ceil(planned*5)}분`:'오늘은 쉬는 날'}</div>
          <div class="mt-8">${badge}</div>
        </div>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" style="color:var(--text-3);flex-shrink:0">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </div>`;
  }).join('');

  // 과제 행 렌더 (inline)
  let taskRows = '';
  try {
    const tasks = await getTasksForDay(dow);
    if (tasks.length) {
      const taskLogs = await Promise.all(tasks.map(t => getTaskLog(t.id, todayStr)));
      taskRows = tasks.map((task, i) => {
        const log = taskLogs[i] || {};
        if (task.type === 'homework') {
          const pct = log.percent ?? 0;
          return `
          <div style="padding:12px 0;border-bottom:1px solid var(--surface-3)">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
              <div>
                <div style="font-size:13px;font-weight:700">📋 ${task.name}</div>
                <div style="font-size:11px;color:var(--text-3)">주간 숙제 · 진행률 체크</div>
              </div>
              <span class="badge ${pct>=100?'badge-success':'badge-primary'}" id="hw-badge-${task.id}">${pct}%</span>
            </div>
            <input type="range" min="0" max="100" step="10" value="${pct}"
              style="width:100%;accent-color:var(--primary)"
              oninput="updateHomeworkPct('${task.id}',this.value)"
              onchange="saveHomework('${task.id}',this.value)">
            <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text-3);margin-top:2px">
              <span>0%</span><span>50%</span><span>100%</span>
            </div>
          </div>`;
        } else {
          const subItems = task.subItems?.length ? task.subItems : [task.name];
          const checked = log.checkedItems || [];
          const rows = subItems.map((item, j) => `
            <label style="display:flex;align-items:center;gap:10px;padding:7px 0;
              border-bottom:1px solid var(--surface-3);cursor:pointer">
              <input type="checkbox" ${checked.includes(j)?'checked':''}
                data-taskid="${task.id}" data-idx="${j}"
                onchange="saveLessonCheck('${task.id}',${JSON.stringify(subItems)})"
                style="width:18px;height:18px;accent-color:var(--primary);flex-shrink:0">
              <span style="font-size:13px">${item}</span>
            </label>`).join('');
          const allDone = checked.length >= subItems.length;
          return `
          <div style="padding:12px 0;border-bottom:1px solid var(--surface-3)">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
              <div>
                <div style="font-size:13px;font-weight:700">🎬 ${task.name}</div>
                <div style="font-size:11px;color:var(--text-3)">강의/학습앱</div>
              </div>
              <span class="badge ${allDone?'badge-success':'badge-muted'}" id="lesson-badge-${task.id}">
                ${checked.length}/${subItems.length}
              </span>
            </div>
            ${rows}
          </div>`;
        }
      }).join('');
    }
  } catch(e) { console.warn('task render error', e); }

  document.getElementById('mission-list').innerHTML = bookRows;
  document.getElementById('task-items').innerHTML   = taskRows;

  // 완료 배지
  const totalBooks = bookStates.length;
  const doneBooks  = bookStates.filter(s => s.log && ['done','partial'].includes(s.log.status)).length;
  document.getElementById('today-done-badge').textContent =
    totalBooks > 0 ? `교재 ${doneBooks}/${totalBooks}` : '';

  document.getElementById('mission-list-section').style.display = 'block';
  document.getElementById('mission-header').style.display = 'none';
}

async function init() {
  const bookId = getParam('bookId');
  document.getElementById('loading-msg').style.display = 'none';
  document.getElementById('main-content').style.display = 'block';

  if (!bookId) {
    const books = await getActiveBooks();
    if (!books.length) {
      document.getElementById('mission-main-title').textContent = '진행 중인 책 없음';
      return;
    }
    await renderMissionList(books);
    return;
  }

  currentBook = await getBook(bookId);
  if (!currentBook) { document.getElementById('mission-main-title').textContent = '진행 중인 책 없음'; return; }

  const yesterday = new Date();
  yesterday.setTime(new Date(selectedDateStr).getTime());
  yesterday.setDate(yesterday.getDate() - 1);
  const yStr = yesterday.toISOString().slice(0, 10);
  const weekDates = getWeekDatesFor(selectedDateStr);
  const [plan, logs] = await Promise.all([
    getOrCreateWeeklyPlan(currentBook, weekDates),
    getDailyLogsForDates(currentBook.id, [selectedDateStr, yStr]),
  ]);
  const adjustedIdx = weekIndexForDate(selectedDateStr);
  todayPlannedPages = plan ? (plan.dailyPages[adjustedIdx] || 0) : currentBook.dailyPages || 5;

  const todayLog = logs[selectedDateStr];
  if (todayLog && (todayLog.status === 'done' || todayLog.status === 'partial')) {
    showCompletedState(todayLog);
    return;
  }

  if (todayPlannedPages === 0) {
    // 휴식일이지만 이미 기록한 경우
    if (todayLog && (todayLog.status === 'done' || todayLog.status === 'partial' || todayLog.status === 'extra')) {
      showCompletedState(todayLog);
      return;
    }
    const isToday = dateWord === '오늘';
    document.getElementById('mission-main-title').textContent = isToday ? '오늘은 휴식일' : '이날은 휴식일';
    document.getElementById('mission-sub').textContent = isToday ? '내일 다시 시작' : '다음 공부일에 다시 시작';
    document.getElementById('rest-section').style.display = 'block';
    return;
  }

  document.getElementById('mission-main-title').textContent =
    `${dateWord} 목표 ${todayPlannedPages}쪽`;
  document.getElementById('mission-sub').textContent =
    `[${currentBook.subject}] ${currentBook.title}`;
  document.getElementById('action-section').style.display = 'block';

  // 이전 기록에서 끝 페이지 불러와 시작 페이지 자동 제안
  const prevLog = logs[yStr];
  if (prevLog && prevLog.endPage) {
    document.getElementById('start-page').value = prevLog.endPage + 1;
    document.getElementById('end-page').value   = prevLog.endPage + todayPlannedPages;
    updateCalc();
  }
}
function recordOnRestDay() {
  // 휴식일에도 기록 허용 — plannedPages를 0으로 유지하고 action-section 열기
  document.getElementById('rest-section').style.display = 'none';
  document.getElementById('action-title').textContent = '오늘 어디까지 읽었어?';
  document.getElementById('action-section').style.display = 'block';
  // 헤더 업데이트
  document.getElementById('mission-main-title').textContent = '추가 기록';
  document.getElementById('mission-sub').textContent =
    `[${currentBook.subject}] ${currentBook.title}`;
}

// ── 과제 섹션 ──────────────────────────────────
async function loadTodayTasks() {
  try {
    const dow = new Date(selectedDateStr + 'T12:00:00').getDay(); // 0=일..6=토
    const tasks = await getTasksForDay(dow);
    if (!tasks.length) return;

    document.getElementById('task-section').style.display = 'block';
    const logs = await Promise.all(tasks.map(t => getTaskLog(t.id, selectedDateStr)));

    const items = document.getElementById('task-items');
    items.innerHTML = tasks.map((task, i) => {
      const log = logs[i] || {};
      if (task.type === 'homework') {
        const pct = log.percent ?? 0;
        return `
        <div class="card mb-8" id="task-card-${task.id}">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <span style="font-size:14px;font-weight:700">${task.name}</span>
            <span class="badge ${pct>=100?'badge-success':'badge-primary'}" id="hw-badge-${task.id}">${pct}%</span>
          </div>
          <input type="range" min="0" max="100" step="10" value="${pct}"
            style="width:100%;accent-color:var(--primary)"
            oninput="updateHomeworkPct('${task.id}',this.value)"
            onchange="saveHomework('${task.id}',this.value)">
          <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-3);margin-top:4px">
            <span>0%</span><span>50%</span><span>100%</span>
          </div>
        </div>`;
      } else {
        // lesson type — checkboxes for sub-items (or whole task if no sub-items)
        const subItems = task.subItems && task.subItems.length ? task.subItems : [task.name];
        const checked = log.checkedItems || [];
        const rows = subItems.map((item, j) => {
          const isChecked = checked.includes(j);
          return `<label style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--surface-3);cursor:pointer">
            <input type="checkbox" ${isChecked?'checked':''} data-taskid="${task.id}" data-idx="${j}"
              onchange="saveLessonCheck('${task.id}',${JSON.stringify(subItems)})"
              style="width:18px;height:18px;accent-color:var(--primary)">
            <span style="font-size:14px">${item}</span>
          </label>`;
        }).join('');
        const totalDone = checked.length;
        const total = subItems.length;
        const allDone = totalDone >= total;
        return `
        <div class="card mb-8" id="task-card-${task.id}">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
            <span style="font-size:14px;font-weight:700">${task.type==='lesson'&&task.subItems?.length?task.name:''}</span>
            <span class="badge ${allDone?'badge-success':'badge-muted'}" id="lesson-badge-${task.id}">${totalDone}/${total}</span>
          </div>
          ${rows}
        </div>`;
      }
    }).join('');
  } catch(e) { console.warn('loadTodayTasks err', e); }
}

function updateHomeworkPct(taskId, val) {
  const badge = document.getElementById('hw-badge-' + taskId);
  if (badge) { badge.textContent = val + '%'; badge.className = 'badge ' + (val>=100?'badge-success':'badge-primary'); }
}

async function saveHomework(taskId, val) {
  const pct = parseInt(val);
  await saveTaskLog(taskId, selectedDateStr, { percent: pct, type: 'homework' });
  updateHomeworkPct(taskId, pct);
}

async function saveLessonCheck(taskId, subItems) {
  const checkboxes = document.querySelectorAll(`input[data-taskid="${taskId}"]`);
  const checked = [];
  checkboxes.forEach(cb => { if (cb.checked) checked.push(parseInt(cb.dataset.idx)); });
  await saveTaskLog(taskId, selectedDateStr, { checkedItems: checked, type: 'lesson' });
  const badge = document.getElementById('lesson-badge-' + taskId);
  if (badge) {
    const allDone = checked.length >= subItems.length;
    badge.textContent = checked.length + '/' + subItems.length;
    badge.className = 'badge ' + (allDone ? 'badge-success' : 'badge-muted');
  }
}

requireAuth(() => init());
setActiveNav('mission');
</script>
