<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주간 작전표 — 작전노트</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="nav-bar">
  <button class="nav-back" onclick="history.back()">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <span class="nav-title">주간 작전표</span>
</header>

<main class="container">

  <div id="loading-msg" style="text-align:center;padding:80px 0;color:var(--text-3)">
    <p class="text-sm">불러오는 중</p>
  </div>

  <div id="main-content" style="display:none">

    <!-- 주간 요약 -->
    <div class="card" style="background:var(--surface-2)">
      <div class="flex items-center justify-between mb-12">
        <div>
          <div class="card-label" style="margin-bottom:4px">이번 주 전체 목표</div>
          <div style="font-size:22px;font-weight:800;letter-spacing:-.3px" id="week-goal-display"></div>
        </div>
        <div class="stat-cell" style="min-width:80px">
          <div class="stat-num" style="font-size:20px" id="week-pct-label">—</div>
          <div class="stat-lbl">달성률</div>
        </div>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="week-progress" style="width:0%"></div>
      </div>
      <div class="progress-meta mt-4">
        <span class="text-2 text-sm" id="week-period"></span>
        <span class="text-sm" id="week-done-label"></span>
      </div>
    </div>

    <!-- 교재별 테이블 -->
    <div class="card">
      <div class="flex items-center justify-between mb-16">
        <div class="card-label" style="margin-bottom:0">교재별 주간 계획</div>
        <button class="btn btn-ghost btn-sm" onclick="toggleEdit()" id="edit-btn">수정</button>
      </div>

      <div style="overflow-x:auto">
        <table class="week-table" id="week-table" style="min-width:620px">
          <thead>
            <tr>
              <th>교재</th><th>월</th><th>화</th><th>수</th><th>목</th><th>금</th><th>토</th><th>일</th><th>완료</th>
            </tr>
          </thead>
          <tbody id="week-tbody"></tbody>
          <tfoot>
            <tr id="day-total-row"></tr>
          </tfoot>
        </table>
      </div>
    </div>

    <!-- 편집 모드 -->
    <div id="edit-section" style="display:none">
      <div class="card">
        <div class="card-label">계획 수정 (0 = 휴식일)</div>
        <div id="edit-inputs"></div>
        <button class="btn btn-primary btn-lg mt-12" onclick="savePlan()">저장</button>
      </div>
    </div>

    <!-- 작전 변경 제안 -->
    <div class="card" id="catchup-card" style="display:none;border-color:var(--accent)">
      <div class="card-label" style="color:var(--accent)">작전 조정 제안</div>
      <p class="text-sm text-2 mb-12" id="catchup-msg"></p>
      <div id="catchup-options"></div>
    </div>

    <!-- 철학 문구 -->
    <div class="callout callout-primary mt-8">
      계획은 틀려도 괜찮아. 중요한 건 <strong>다시 조정하는 것</strong>.
    </div>

  </div>
</main>

<nav class="bottom-nav">
  <a href="index.html" data-page="home"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>홈</a>
  <a href="mission.html" data-page="mission"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>미션</a>
  <a href="weekly.html" data-page="weekly" class="active"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>작전표</a>
  <a href="review.html" data-page="review"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>점검</a>
  <a href="bookshelf.html" data-page="books"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>책장</a>
</nav>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="app.js"></script>
<script>
const DAYS = ['월','화','수','목','금','토','일'];
let activeBooks = [], weekDates = [], weekStart = '';
let bookStates = [], dayTotals = [], isEditing = false;

async function init() {
  activeBooks = await getActiveBooks();
  document.getElementById('loading-msg').style.display = 'none';
  document.getElementById('main-content').style.display = 'block';
  if (!activeBooks.length) { document.getElementById('week-goal-display').textContent = '진행 중인 책 없음'; return; }

  weekDates = getThisWeekDates();
  weekStart = weekDates[0];
  bookStates = [];
  for (const book of activeBooks) {
    const plan = await getOrCreateWeeklyPlan(book, weekDates);
    const logs = {};
    for (const d of weekDates) logs[d] = await getDailyLog(book.id, d);
    bookStates.push({ book, plan, logs });
  }
  renderTable(); renderSummary(); checkLoadSuggestions();
}

function renderTable() {
  const tbody = document.getElementById('week-tbody');
  const todayStr = today();
  tbody.innerHTML = '';

  bookStates.forEach(state => {
    const tr = document.createElement('tr');
    const weekDone = weekDates.reduce((sum, d) => sum + (state.logs[d]?.completedPages || 0), 0);
    const cells = state.plan.dailyPages.map((planned, i) => {
      const d = weekDates[i];
      const log = state.logs[d];
      const done = log?.completedPages || 0;
      const isToday = d === todayStr;
      const label = planned > 0 ? `${planned}쪽` : '—';
      const doneText = done > 0 ? `<br><span class="text-xs text-success">${done}쪽</span>` : '';
      const todayClass = isToday ? ' class="today"' : '';
      return `<td${todayClass}>${label}${doneText}</td>`;
    }).join('');
    tr.innerHTML = `
      <td style="min-width:120px;text-align:left">
        <strong>${state.book.title}</strong><br>
        <span class="text-xs text-3">[${state.book.subject}]</span>
      </td>
      ${cells}
      <td><strong>${weekDone}쪽</strong></td>
    `;
    tbody.appendChild(tr);
  });

  dayTotals = weekDates.map((_, i) => bookStates.reduce((sum, state) => sum + (state.plan.dailyPages[i] || 0), 0));
  document.getElementById('day-total-row').innerHTML = `
    <td><strong>총량</strong></td>
    ${dayTotals.map((total, i) => `<td${weekDates[i] === todayStr ? ' class="today"' : ''}><strong>${total || '—'}</strong>${total ? '<br><span class="text-xs text-3">쪽</span>' : ''}</td>`).join('')}
    <td><strong>${dayTotals.reduce((a,b)=>a+b,0)}쪽</strong></td>
  `;
}

function renderSummary() {
  const goal = bookStates.reduce((sum, state) => sum + state.plan.dailyPages.reduce((a,b)=>a+b,0), 0);
  let done = 0;
  bookStates.forEach(state => {
    weekDates.forEach(d => { done += state.logs[d]?.completedPages || 0; });
  });
  const pct = goal>0 ? Math.round(done/goal*100) : 0;
  document.getElementById('week-goal-display').textContent = goal + '쪽';
  document.getElementById('week-period').textContent = `${formatDate(weekStart)} — ${formatDate(weekDates[6])}`;
  document.getElementById('week-progress').style.width = Math.min(100, pct) + '%';
  document.getElementById('week-done-label').textContent = `${done}쪽 완료`;
  document.getElementById('week-pct-label').textContent = pct + '%';
}

function checkLoadSuggestions() {
  document.getElementById('catchup-card').style.display = 'none';
  const overloaded = dayTotals
    .map((total, i) => ({ total, i }))
    .filter(d => d.total >= 25);
  const behindBooks = [];

  bookStates.forEach(state => {
    const totalDone = weekDates.reduce((sum, d) => sum + (state.logs[d]?.completedPages || 0), 0);
    const goal = state.plan.dailyPages.reduce((a,b)=>a+b,0);
    if (goal > 0 && totalDone / goal < 0.6) behindBooks.push(state.book.title);
  });

  if (!overloaded.length && !behindBooks.length) return;

  document.getElementById('catchup-card').style.display = 'block';
  const loadText = overloaded.length
    ? `${overloaded.map(d => `${DAYS[d.i]}요일 ${d.total}쪽`).join(', ')}로 분량이 몰려 있어.`
    : '';
  const behindText = behindBooks.length
    ? `${behindBooks.join(', ')} 교재가 이번 주 목표보다 많이 밀려 있어.`
    : '';
  document.getElementById('catchup-msg').textContent = [loadText, behindText].filter(Boolean).join(' ');
  document.getElementById('catchup-options').innerHTML = `
    <button class="btn btn-ghost btn-md w-full mb-8" onclick="toggleEdit()">
      요일별 분량 직접 조정하기
    </button>
    <a class="btn btn-ghost btn-md w-full" href="review.html">
      주간 점검에서 다음 주 작전 정하기
    </a>
  `;
}

function toggleEdit() {
  isEditing = !isEditing;
  document.getElementById('edit-section').style.display = isEditing ? 'block' : 'none';
  document.getElementById('edit-btn').textContent = isEditing ? '취소' : '수정';
  if (isEditing) {
    document.getElementById('edit-inputs').innerHTML = bookStates.map((state, bookIdx) => `
      <div style="padding:12px 0;border-bottom:1px solid var(--border)">
        <div class="text-sm font-semibold mb-8">[${state.book.subject}] ${state.book.title}</div>
        ${weekDates.map((_, i) => `
          <div class="flex items-center justify-between" style="padding:6px 0">
            <span class="text-sm">${DAYS[i]}요일</span>
            <div class="flex items-center gap-8">
              <input class="form-input" type="number" min="0" id="edit-${bookIdx}-${i}"
                value="${state.plan.dailyPages[i]||0}" style="width:72px;text-align:center">
              <span class="text-sm text-3">쪽</span>
            </div>
          </div>
        `).join('')}
      </div>
    `).join('');
  }
}

async function savePlan() {
  for (let bookIdx = 0; bookIdx < bookStates.length; bookIdx++) {
    const state = bookStates[bookIdx];
    const nextPages = weekDates.map((_, i) => parseInt(document.getElementById(`edit-${bookIdx}-${i}`).value)||0);
    state.plan.dailyPages = nextPages;
    state.plan.weekGoal = nextPages.reduce((a,b)=>a+b,0);
    await saveWeeklyPlan(state.book.id, weekStart, state.plan);
  }
  showToast('저장 완료');
  isEditing = false;
  document.getElementById('edit-section').style.display = 'none';
  document.getElementById('edit-btn').textContent = '수정';
  renderTable(); renderSummary(); checkLoadSuggestions();
}

requireAuth(() => init());
setActiveNav('weekly');
</script>
</body>
</html>
