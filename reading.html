<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>독서 — 작전노트</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#6366f1">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="작전노트">
<link rel="stylesheet" href="style.css">
<style>
.module-card {
  display:flex; align-items:center; gap:16px; padding:20px;
  border:2px solid var(--surface-3); border-radius:var(--r);
  cursor:pointer; text-decoration:none; color:inherit;
  transition:border-color .15s, background .15s; margin-bottom:12px;
}
.module-card:hover { border-color:var(--primary); background:rgba(99,102,241,.04); }
.module-icon  { font-size:36px; flex-shrink:0; }
.module-title { font-size:15px; font-weight:800; margin-bottom:4px; }
.module-desc  { font-size:12px; color:var(--text-3); line-height:1.5; }
.chat-item { display:flex; align-items:center; gap:12px;
  padding:12px 0; border-bottom:1px solid var(--surface-3); cursor:pointer; }
.chat-item:last-child { border-bottom:none; }
.chat-title   { font-size:13px; font-weight:700; }
.chat-meta    { font-size:11px; color:var(--text-3); margin-top:2px; }
.chat-preview { font-size:12px; color:var(--text-2); margin-top:2px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:220px; }
</style>
</head>
<body>
<header class="nav-bar">
  <button class="nav-back" onclick="history.back()">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
      fill="none" stroke="currentColor" stroke-width="2.5"
      stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <span class="nav-title">독서</span>
  <div></div>
</header>

<main class="container">

  <div class="card-label mt-8">무엇을 해볼까?</div>

  <a class="module-card" href="reading-book.html">
    <div class="module-icon">📚</div>
    <div>
      <div class="module-title">책 읽고 이야기하기</div>
      <div class="module-desc">책 표지를 찍으면 AI가 책을 파악하고<br>내용·감상·확장 대화를 이끌어줘요</div>
    </div>
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
      fill="none" stroke="currentColor" stroke-width="2"
      style="color:var(--text-3);flex-shrink:0;margin-left:auto"><polyline points="9 18 15 12 9 6"/></svg>
  </a>

  <a class="module-card" href="reading-passage.html">
    <div class="module-icon">🔍</div>
    <div>
      <div class="module-title">글 찍어 탐구하기</div>
      <div class="module-desc">본문 글을 찍으면 핵심 개념을 파악하고<br>정확한 지식과 호기심 탐구를 함께해요</div>
    </div>
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
      fill="none" stroke="currentColor" stroke-width="2"
      style="color:var(--text-3);flex-shrink:0;margin-left:auto"><polyline points="9 18 15 12 9 6"/></svg>
  </a>

  <div class="card mt-8" id="recent-card" style="display:none">
    <div class="card-label mb-12">최근 대화</div>
    <div id="recent-list"></div>
  </div>
  <div id="loading-recent" style="text-align:center;padding:24px 0;color:var(--text-3);font-size:13px">불러오는 중...</div>

</main>

<nav class="bottom-nav">
  <a href="index.html" data-page="home"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>홈</a>
  <a href="mission.html" data-page="mission"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>미션</a>
  <a href="reading.html" data-page="reading" class="active"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>독서</a>
  <a href="weekly.html" data-page="weekly"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>작전표</a>
  <a href="review.html" data-page="review"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>점검</a>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="app.js"></script>
<script>
async function loadRecent() {
  try {
    const snap = await db.collection('users').doc(USER_ID)
      .collection('readingChats')
      .orderBy('updatedAt', 'desc').limit(5).get();
    document.getElementById('loading-recent').style.display = 'none';
    if (snap.empty) return;
    document.getElementById('recent-card').style.display = 'block';
    document.getElementById('recent-list').innerHTML = snap.docs.map(doc => {
      const d = doc.data();
      const isBook = d.type === 'book';
      const title = isBook ? (d.bookTitle||'책') : (d.keywords?.[0]||'글 탐구');
      const meta  = isBook ? (d.bookAuthor||'') : (d.keywords?.slice(0,2).join(', ')||'');
      const date  = d.updatedAt ? new Date(d.updatedAt).toLocaleDateString('ko-KR',{month:'short',day:'numeric'}) : '';
      const last  = d.messages?.slice(-1)[0]?.content || '';
      const page  = isBook ? 'reading-book.html' : 'reading-passage.html';
      return `<div class="chat-item" onclick="location.href='${page}?chatId=${doc.id}'">
        <span style="font-size:22px">${isBook?'📚':'🔍'}</span>
        <div style="flex:1;min-width:0">
          <div class="chat-title">${title}</div>
          <div class="chat-meta">${meta} · ${date}</div>
          <div class="chat-preview">${last}</div>
        </div>
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text-3);flex-shrink:0">
          <polyline points="9 18 15 12 9 6"/></svg>
      </div>`;
    }).join('');
  } catch(e) {
    document.getElementById('loading-recent').style.display = 'none';
  }
}
requireAuth(() => { loadRecent(); });
setActiveNav('reading');
</script>
</body>
</html>
